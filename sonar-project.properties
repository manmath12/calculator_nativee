# Project identification
sonar.projectKey=demo
sonar.projectName=calculator_nativee
sonar.sources=.

# DISABLE THE JSON CRASH
# We point this to a name that doesn't exist so the parser skips it
sonar.dependencyCheck.jsonReportPath=NONE

# FORCE THE XML PARSER
# This is the file that actually contains the vulnerabilities
sonar.dependencyCheck.xmlReportPath=dc-reports/dependency-check-report.xml
sonar.dependencyCheck.htmlReportPath=dc-reports/dependency-check-report.html

# Speed up the scan by ignoring the report files and node_modules
sonar.exclusions=dc-reports/**,reports/**,**/node_modules/**,**/__tests__/**
