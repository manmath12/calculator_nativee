# Disable the JSON parser by pointing it to a non-existent file
sonar.dependencyCheck.jsonReportPath=NONE

# Explicitly tell it where the XML file is (which is stable)
sonar.dependencyCheck.xmlReportPath=dc-reports/dependency-check-report.xml

# Standard exclusion to stop Sonar from trying to "scan" the report files as code
sonar.exclusions=dc-reports/**,reports/**
